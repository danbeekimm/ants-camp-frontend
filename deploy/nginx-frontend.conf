# ──────────────────────────────────────────────────────────────────────────
# app.antscamp.site nginx server 블록 (참고용 사본)
#
# 실제 운영 설정은 인스턴스의 /etc/nginx/sites-available/my-static-site 에 있다.
# 전제
#   - Cloudflare가 공개 TLS/프록시 담당, 오리진은 Cloudflare Origin 인증서로 443 종단
#   - 백엔드 게이트웨이는 127.0.0.1:8080 (docker-compose.lite.yml)
#   - 네이버 API 키는 /etc/nginx/snippets/naver-keys.conf (proxy_set_header 2줄, root 600)
#       proxy_set_header X-Naver-Client-Id     "<NAVER_CLIENT_ID>";
#       proxy_set_header X-Naver-Client-Secret "<NAVER_CLIENT_SECRET>";
#   - 배포 산출물: /home/ubuntu/ants-camp/frontend/dist (Frontend CD 워크플로가 교체)
#     /home/ubuntu 에 o+x 필요 (nginx www-data 디렉터리 통과)
# ──────────────────────────────────────────────────────────────────────────

server {
    listen 443 ssl;
    server_name app.antscamp.site;

    ssl_certificate     /etc/nginx/ssl/cloudflare-origin.pem;
    ssl_certificate_key /etc/nginx/ssl/cloudflare-origin.key;

    root /home/ubuntu/ants-camp/frontend/dist;
    index index.html;

    # 해시 파일명 자산은 영구 캐시, index.html은 항상 재검증
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location / {
        try_files $uri /index.html;
    }

    # 네이버 뉴스 검색 — 키 주입 (location /api/ 보다 먼저 매칭되는 exact match)
    location = /api/naver/news {
        proxy_pass https://openapi.naver.com/v1/search/news.json;
        proxy_ssl_server_name on;
        include /etc/nginx/snippets/naver-keys.conf;
    }

    # 백엔드 게이트웨이 (same-origin → CORS 불필요)
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }

    # STOMP WebSocket → 게이트웨이 → trade-service (공개 시세 스트림, 무인증 —
    # 게이트웨이 GatewaySecurityConfig의 permitAll("/ws-stomp/**") 전제)
    location /ws-stomp {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Yahoo Finance (지수·환율 지연 시세) — User-Agent 주입
    location /yahoo/ {
        proxy_pass https://query1.finance.yahoo.com/;
        proxy_ssl_server_name on;
        proxy_set_header User-Agent "Mozilla/5.0";
        proxy_set_header Accept "application/json";
        proxy_set_header Accept-Language "en-US,en;q=0.9";
    }
}
