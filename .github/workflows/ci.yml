name: Frontend CI

# PR 검증 — ESLint + tsc 타입 체크 + vite 빌드

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: 빌드 검증
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run build
